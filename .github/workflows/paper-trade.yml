name: paper-trade

on:
  schedule:
    - cron: "7 0,4,8,12,16,20 * * *"  # 7 min after each 4H candle close (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --quiet pandas numpy

      - name: Bootstrap data cache on first run
        run: |
          mkdir -p live_data
          if [ -z "$(ls -A live_data 2>/dev/null)" ] && [ -d data ]; then
            cp data/*.csv live_data/
          fi

      - name: Run trading step (v2 trade engine)
        env:
          TRADE_MODE: paper
          LIVE_ANCHOR: "2026-01-01"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python run_live.py

      - name: Run trading step (v3 portfolio system)
        env:
          TRADE_MODE: paper
          LIVE_ANCHOR: "2026-01-01"
        run: python run_live_v3.py

      - name: Commit journal and data cache
        run: |
          git config user.name "fabletradebot"
          git config user.email "bot@users.noreply.github.com"
          git add journal live_data
          if ! git diff --cached --quiet; then
            git commit -m "paper-trade: journal update $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
